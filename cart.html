    <title>ShopMall - 장바구니</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/common.css" />

  <body>
    <header class="site-header">
      <div class="header-top container">
        <a href="./index.html" class="logo" aria-label="ShopMall home">logo</a>
        <nav class="simple-nav" aria-label="주요 메뉴">
          <ul>
            <li><a href="./index.html">홈</a></li>
            <li><a href="./index.html#products">상품</a></li>
            <li><a href="#">고객센터</a></li>
          </ul>
        </nav>
        <div class="user-actions">
          <a href="#">로그인</a>
          <a href="#">회원가입</a>
          <a href="./cart.html" class="cart-button" aria-label="장바구니">
            <span class="cart-icon" aria-hidden="true"></span>
            <span class="cart-count">3</span>
          </a>
        </div>
      </div>
    </header>

    <main class="cart-main">
      <section class="cart-page container" aria-labelledby="cart-title">
        <nav class="breadcrumb" aria-label="현재 위치">
          <a href="./index.html">홈</a>
          <span aria-hidden="true">&gt;</span>
          <strong>장바구니</strong>
        </nav>

        <div class="cart-title-row">
          <h1 id="cart-title">장바구니</h1>
          <p class="cart-count-text">총 0개의 상품</p>
        </div>

        <div class="cart-layout">
          <section class="cart-list" aria-label="장바구니 상품 목록">
            <div class="cart-list-header">
              <label class="select-all">
                <input type="checkbox" checked />
                <span>전체선택 (0/0)</span>
              </label>
              <button type="button">선택삭제</button>
            </div>

              <span class="item-check"><span class="check-box" aria-hidden="true"></span></span>

              </div>
              <div class="cart-item-info">
                <h2>프리미엄 무선 블루투스 헤드폰</h2>

                <strong>189,000원</strong>
              </div>
              <div class="quantity-box" aria-label="수량">
                <button type="button" aria-label="수량 줄이기">-</button>

            </article> -->
          </section>

          <aside class="cart-side" aria-label="주문 요약">
            <section class="order-card">
              <h2>주문 정보</h2>
              <div class="order-row">
                <span>상품금액</span>
                <strong>592,000원</strong>
              </div>
              <div class="order-row">
                <span>배송비</span>
                <strong>무료</strong>
              </div>
              <div class="order-total">
                <span>총 결제금액</span>
                <strong>592,000원</strong>
              </div>
              <button type="button" class="btn btn-primary">주문하기</button>
              <ul class="order-benefits">
                <li>50,000원 이상 무료배송</li>
                <li>안전한 결제 시스템</li>
              </ul>
            </section>

            <section class="recommend-card">
              <h2>추천 상품</h2>
              <article class="mini-product">
                <img
                  src="https://images.unsplash.com/photo-1601593346740-925612772716?auto=format&fit=crop&w=120&q=80"
                  alt="투명 스마트폰 케이스"
                />
                <div>
                  <h3>투명 스마트폰 케이스</h3>
                  <p>29,000원</p>
                </div>
                <button type="button" class="recommend-add">담기</button>
              </article>
              <article class="mini-product">
                <img
                  src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?auto=format&fit=crop&w=120&q=80"
                  alt="접이식 휴대폰 거치대"
                />
                <div>
                  <h3>접이식 휴대폰 거치대</h3>
                  <p>19,000원</p>
                </div>
                <button type="button" class="recommend-add">담기</button>
              </article>
            </section>
          </aside>
        </div>

        <div class="continue-wrap">
          <a href="./index.html" class="continue-link">← 쇼핑 계속하기</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner container">
        <p>© 2024 ShopMall. All rights reserved.</p>
        <ul class="payment-list" aria-label="지원 결제 수단">
          <li>visa</li>
          <li>mc</li>
          <li>p</li>
        </ul>
      </div>
    </footer>
    <script type="module" src="js/cart.js"></script>
